      configurations on the C64U.
    terminal_modes: [ANSI-wide, ANSI-40]
    baud_recommended: 38400
    tags: [chat, door-games, message-networks]
    ansi_style: ansi
    country: US
    submitted_by: bvterm-seed

  - slug: amigacity
    name: Amigacity / 1200 Baud Underground
    host: amigacity.xyz
    port: 8023
    sysop: ricardobastos
    established: 2020
    description: |
      Brazilian scene-art BBS — primarily Amiga but with active C64
      sub-boards. Excellent ANSI art collections. Slightly slower
      response from US — but worth the dial for the art alone.
    terminal_modes: [ANSI-wide, VT102]
    baud_recommended: 9600
    tags: [ansi-art, scene, international]
    ansi_style: ansi
    country: BR
    submitted_by: bvterm-seed

  - slug: phoenix
    name: Phoenix Lair
    host: phoenix.bnbbs.net
    port: 9999
    sysop: phoenix
    established: 2019
    description: |
      Multi-system BBS supporting various retro platforms. Active
      door-game tournaments. Good test for high-baud terminal stacks
      since the sysop runs modern hardware behind it.
    terminal_modes: [ANSI-wide, VT102-wide]
    baud_recommended: 38400
    tags: [door-games, tournaments, chat]
    ansi_style: ansi
    country: US
    submitted_by: bvterm-seed

  - slug: blackflag
    name: Black Flag BBS
    host: blackflag.acid.org
    port: 23
    sysop: blackflag
    established: 1994
    description: |
      Legendary ACiD-affiliated art-scene BBS, one of the longest-running
      scene boards still online. ANSI/ASCII art archives going back to
      the 90s. A pilgrimage site for anyone interested in BBS-era art.
    terminal_modes: [ANSI-wide, VT102]
    baud_recommended: 38400
    tags: [scene, ansi-art, ascii-art, historic]
    ansi_style: ansi
    country: US
    homepage: https://blackflag.acid.org
    submitted_by: bvterm-seed
